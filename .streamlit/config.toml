[theme]
# اللون الأساسي للأزرار والخطوط التفاعلية (اخترنا الأخضر المريح للمشاريع البلدية)
primaryColor = "#00875A" 

# لون الخلفية الرئيسية (أبيض ناصع لتظهر الأرقام بوضوح)
backgroundColor = "#FFFFFF" 

# لون خلفية البطاقات (Metrics) والشريط الجانبي (رمادي فاتح ومميز)
secondaryBackgroundColor = "#F8F9FA" 

# لون النصوص الأساسية (أسود داكن لأعلى درجة وضوح وقراءة)
textColor = "#1F2937" 

font = "sans serif"
